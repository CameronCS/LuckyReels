<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Plinko</title>
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/plinko.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Connecting...</div>

<div class="app-wrapper hidden" id="gameUI">

  <!-- Header -->
  <div class="game-header">
    <a class="back-btn" href="/">← Hub</a>
    <div class="header-center">
      <h1>Plinko</h1>
      <p class="tagline">8 Rows · 9 Slots · Drop & Pray</p>
    </div>
    <div class="header-right">
      <div class="player-pill" id="playerPill">🎯 <span id="playerNameDisplay"></span></div>
      <div class="tokens-box">
        <div class="tokens-box-label">🪙 Tokens</div>
        <div class="tokens-value" id="tokenCount">0</div>
      </div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrapper">
    <canvas id="plinkoCanvas"></canvas>
    <div class="result-overlay hidden" id="resultOverlay"></div>
  </div>

  <!-- Risk selector -->
  <div class="risk-bar">
    <span class="risk-label">RISK</span>
    <button class="risk-btn" data-val="low">LOW</button>
    <button class="risk-btn active" data-val="medium">MEDIUM</button>
    <button class="risk-btn" data-val="high">HIGH</button>
  </div>

  <!-- Bet controls -->
  <div class="controls-bar">
    <span class="bet-label">Bet</span>
    <button class="bet-btn active" data-val="10">10</button>
    <button class="bet-btn" data-val="25">25</button>
    <button class="bet-btn" data-val="50">50</button>
    <button class="bet-btn" data-val="100">100</button>
    <button class="bet-btn" data-val="250">250</button>
    <button class="bet-btn" data-val="500">500</button>
    <input class="bet-custom" type="number" id="betCustom" placeholder="custom" min="10">
    <div class="current-bet-display">BET <span id="betDisplay">10</span></div>
  </div>

  <!-- Action -->
  <div class="action-bar" id="actionBar"></div>
  <div class="no-tokens-msg hidden" id="noTokensMsg">⛔ Out of tokens — ask the admin to top you up.</div>

  <!-- Rules -->
  <div class="rules-strip">
    <div class="rule"><span class="c-pink">High risk</span>29× edge, 0.2× center</div>
    <div class="rule"><span class="c-amber">Medium</span>13× edge, 0.4× center</div>
    <div class="rule"><span class="c-blue">Low risk</span>5.6× edge, 0.5× center</div>
    <div class="rule"><span class="c-dim">House edge</span>~1% on all payouts</div>
  </div>

</div>

<script src="/js/plinko.js" defer></script>
</body>
</html>
