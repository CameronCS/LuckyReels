<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Crash</title>
<link rel="stylesheet" href="/css/crash.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="loading-screen" id="loadingScreen">Connecting...</div>

<div class="app-wrapper" id="gameUI" style="display:none">

  <!-- Header -->
  <div class="game-header">
    <a class="back-btn" href="/">← Hub</a>
    <div class="header-center">
      <h1>Crash</h1>
      <p class="tagline">Cash Out Before It Crashes</p>
    </div>
    <div class="header-right">
      <div class="player-pill" id="playerPill">🚀 <span id="playerNameDisplay"></span></div>
      <div class="tokens-box">
        <div class="tokens-box-label">🪙 Tokens</div>
        <div class="tokens-value" id="tokenCount">0</div>
      </div>
    </div>
  </div>

  <!-- Crash display -->
  <div class="crash-display" id="crashDisplay">
    <canvas id="crashCanvas"></canvas>
    <div class="mult-overlay">
      <div class="mult-value" id="multValue">—</div>
      <div class="mult-sub" id="multSub"></div>
    </div>
  </div>

  <!-- Bet controls (idle only) -->
  <div class="controls-bar" id="controlsBar">
    <span class="bet-label">Bet</span>
    <button class="bet-btn" data-val="10">10</button>
    <button class="bet-btn" data-val="25">25</button>
    <button class="bet-btn active" data-val="50">50</button>
    <button class="bet-btn" data-val="100">100</button>
    <button class="bet-btn" data-val="250">250</button>
    <button class="bet-btn" data-val="500">500</button>
    <input class="bet-custom" type="number" id="betCustom" placeholder="custom" min="10">
    <div class="current-bet-display">BET <span id="betDisplay">50</span></div>
  </div>

  <!-- Auto cash out (idle only) -->
  <div class="auto-cashout-bar" id="autoCashoutBar">
    <span class="ac-label">AUTO CASH OUT AT</span>
    <input class="ac-input" type="number" id="autoCashoutInput" placeholder="off" min="1.01" step="0.01">
    <span class="ac-suffix">×</span>
  </div>

  <!-- Action -->
  <div class="action-bar" id="actionBar"></div>
  <div class="no-tokens-msg" id="noTokensMsg">⛔ Out of tokens — ask the admin to top you up.</div>

  <!-- Rules -->
  <div class="rules-strip">
    <div class="rule"><span style="color:#00D4FF">Bet & Launch</span>Multiplier climbs from 1×</div>
    <div class="rule"><span style="color:#00FF87">Cash Out</span>Collect bet × multiplier</div>
    <div class="rule"><span style="color:#FF4500">Crash</span>Lose your entire bet</div>
    <div class="rule"><span style="color:#888">House edge</span>~1% · Crash at any time</div>
  </div>

</div>

<script src="/js/crash.js" defer></script>
</body>
</html>
